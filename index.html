<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پخش زنده IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.0/dist/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #0a0f1c; --bg2: #111827; --card: #1a202c; --card-hover: #2d3748;
            --text: #e0e0e0; --text2: #a0aec0; --accent: #facc15; --accent-text: #1a202c;
            --border: #2d3748; --input-bg: #2d3748; --shadow: 0 0 30px rgba(0,0,0,0.5);
            --radius: 12px; --transition: 0.3s ease;
        }
        .light-mode {
            --bg: #f7fafc; --bg2: #edf2f7; --card: #ffffff; --card-hover: #e2e8f0;
            --text: #1a202c; --text2: #4a5568; --accent: #d69e2e;
            --border: #e2e8f0; --input-bg: #edf2f7; --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; transition: background var(--transition), color var(--transition); }
        .header { background: var(--bg2); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 1.6rem; color: var(--accent); }
        .theme-toggle { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; }
        .container { display: flex; flex: 1; }
        .sidebar { width: 320px; background: var(--bg2); padding: 15px; border-left: 1px solid var(--border); max-height: calc(100vh - 80px); overflow-y: auto; }
        .search-box { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); border-radius: 8px; }
        .view-toggle { display: flex; gap: 5px; margin-bottom: 15px; }
        .view-toggle button { flex: 1; padding: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; cursor: pointer; }
        .view-toggle button.active { background: var(--accent); color: var(--accent-text); font-weight: bold; }
        .channel-list li, .grid-item { cursor: pointer; transition: var(--transition); }
        .channel-list li { padding: 12px 15px; margin-bottom: 5px; background: var(--card); border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        .channel-list li:hover { background: var(--card-hover); transform: translateX(-4px); }
        .channel-list li.active { background: var(--accent); color: var(--accent-text); font-weight: bold; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .grid-item { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .grid-item:hover { background: var(--card-hover); transform: translateY(-3px); }
        .grid-item.active { background: var(--accent); color: var(--accent-text); font-weight: bold; }
        .player-area { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; max-width: 1000px; max-height: 70vh; background: #000; border-radius: var(--radius); box-shadow: var(--shadow); transition: opacity 0.4s; }
        video.loading { opacity: 0.4; }
        .spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        .spinner.show { display: block; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        .custom-controls { width: 100%; max-width: 1000px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 0 0 var(--radius) var(--radius); margin-top: -4px; display: flex; align-items: center; gap: 10px; color: #fff; }
        .custom-controls button { background: transparent; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; padding: 5px; transition: 0.2s; }
        .custom-controls button:hover { color: var(--accent); }
        .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.1s linear; }
        .time-display { font-size: 13px; white-space: nowrap; }
        .volume-slider { width: 80px; accent-color: var(--accent); }
        .note { color: var(--text2); margin-top: 15px; font-size: 13px; text-align: center; }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; max-height: 300px; border-left: none; border-bottom: 1px solid var(--border); }
            .player-area { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 پخش زنده</h1>
        <button class="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> <span id="theme-label">تاریک</span>
        </button>
    </div>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <input type="text" class="search-box" id="search" placeholder="🔍 جستجوی کانال...">
            <div class="view-toggle">
                <button id="listViewBtn" class="active" onclick="setView('list')">📋 لیست</button>
                <button id="gridViewBtn" onclick="setView('grid')">🔲 شبکه</button>
            </div>
            <div id="channelContainer"></div>
        </div>
        <div class="player-area">
            <video id="video" muted autoplay playsinline></video>
            <div class="spinner" id="spinner"></div>
            <div class="custom-controls" id="controls">
                <button onclick="togglePlay()" id="playBtn">▶️</button>
                <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                <button onclick="toggleMute()" id="muteBtn">🔊</button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" onchange="setVolume(this.value)">
                <button onclick="togglePiP()">🖼️</button>
                <button onclick="document.getElementById('video').requestFullscreen()">⛶</button>
            </div>
            <div class="note">⚠️ کلیدهای DRM ممکن است منقضی شوند.</div>
        </div>
    </div>
    <script>
        // آدرس پروکسی CORS خود را وارد کنید
        const CORS_PROXY = 'https://cors-proxy.XXXX.workers.dev/?url=';

        const channels = [
          { id: 71, name: "CTV SPORTS", mpd: "https://otte.cache.aiv-cdn.net/.../cenc.mpd", keyId: "d185...", key: "014f..." },
          // بقیه کانال‌ها را اینجا بگذارید
        ];

        // توابع اصلی
        let currentView = 'list';
        let currentPlayer = null;
        let activeChannelId = null;

        function applyTheme(dark) {
            document.body.classList.toggle('light-mode', !dark);
            document.getElementById('theme-icon').textContent = dark ? '☀️' : '🌙';
            document.getElementById('theme-label').textContent = dark ? 'روشن' : 'تاریک';
            localStorage.setItem('iptv-theme', dark ? 'dark' : 'light');
        }
        function toggleTheme() {
            const isDark = !document.body.classList.contains('light-mode');
            applyTheme(!isDark);
        }
        applyTheme(localStorage.getItem('iptv-theme') !== 'light');

        function setView(view) {
            currentView = view;
            document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
            document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
            renderChannels(document.getElementById('search').value);
        }

        function destroyPlayer() {
            if (currentPlayer === 'shaka') video.src = '';
            else if (currentPlayer === 'hls' && window.hlsInstance) {
                window.hlsInstance.destroy();
                window.hlsInstance = null;
            }
            currentPlayer = null;
        }

        function playChannel(channel) {
            showSpinner(true);
            destroyPlayer();
            video.classList.add('loading');

            const process = (resolve, reject) => {
                if (channel.hls) {
                    const url = CORS_PROXY + encodeURIComponent(channel.hls);
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().then(resolve).catch(reject));
                        window.hlsInstance = hls;
                        currentPlayer = 'hls';
                    } else {
                        video.src = url;
                        video.play().then(resolve).catch(reject);
                        currentPlayer = 'hls';
                    }
                } else if (channel.mpd) {
                    const url = CORS_PROXY + encodeURIComponent(channel.mpd);
                    if (!shaka.Player.isBrowserSupported()) return reject(new Error('Shaka Player پشتیبانی نمی‌شود'));
                    const player = new shaka.Player();
                    player.attach(video);
                    if (channel.keyId && channel.key) {
                        player.configure({ drm: { clearKeys: { [channel.keyId]: channel.key } } });
                    }
                    player.load(url).then(() => video.play().then(resolve).catch(reject)).catch(reject);
                    window.shakaPlayerInstance = player;
                    currentPlayer = 'shaka';
                }
            };

            new Promise(process).then(() => {
                video.classList.remove('loading');
                showSpinner(false);
                updatePlayButton();
            }).catch(err => {
                console.error(err);
                alert('خطا در پخش: ' + (err.message || err));
                video.classList.remove('loading');
                showSpinner(false);
            });
        }

        function showSpinner(show) { document.getElementById('spinner').classList.toggle('show', show); }

        function renderChannels(filter = '') {
            const container = document.getElementById('channelContainer');
            container.innerHTML = '';
            const filtered = channels.filter(ch => ch.name.includes(filter));
            if (currentView === 'list') {
                const ul = document.createElement('ul'); ul.className = 'channel-list';
                filtered.forEach(ch => {
                    const li = document.createElement('li');
                    li.textContent = ch.name;
                    li.onclick = () => selectChannel(ch, li);
                    if (ch.id === activeChannelId) li.classList.add('active');
                    ul.appendChild(li);
                });
                container.appendChild(ul);
            } else {
                const grid = document.createElement('div'); grid.className = 'channel-grid';
                filtered.forEach(ch => {
                    const div = document.createElement('div'); div.className = 'grid-item';
                    if (ch.id === activeChannelId) div.classList.add('active');
                    div.innerHTML = '<span class="grid-icon">📺</span><span>' + ch.name + '</span>';
                    div.onclick = () => selectChannel(ch, div);
                    grid.appendChild(div);
                });
                container.appendChild(grid);
            }
        }

        function selectChannel(channel, element) {
            document.querySelectorAll('.channel-list li, .grid-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            activeChannelId = channel.id;
            playChannel(channel);
        }

        document.getElementById('search').addEventListener('input', e => renderChannels(e.target.value));

        // کنترل‌های پخش
        function togglePlay() { video.paused ? video.play() : video.pause(); updatePlayButton(); }
        function updatePlayButton() { document.getElementById('playBtn').textContent = video.paused ? '▶️' : '⏸️'; }
        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const pct = (video.currentTime / video.duration) * 100;
                document.getElementById('progressFill').style.width = pct + '%';
                document.getElementById('timeDisplay').textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });
        document.getElementById('progressBar').addEventListener('click', e => {
            const rect = e.target.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            video.currentTime = pct * video.duration;
        });
        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteBtn').textContent = video.muted ? '🔇' : '🔊';
            document.getElementById('volumeSlider').value = video.muted ? 0 : video.volume;
        }
        function setVolume(val) { video.volume = val; video.muted = (val == 0); }
        video.addEventListener('volumechange', () => {
            document.getElementById('volumeSlider').value = video.muted ? 0 : video.volume;
            document.getElementById('muteBtn').textContent = video.muted ? '🔇' : '🔊';
        });
        function togglePiP() { document.pictureInPictureElement ? document.exitPictureInPicture() : video.requestPictureInPicture(); }
        function formatTime(sec) { const m = Math.floor(sec/60), s = Math.floor(sec%60); return `${m}:${s.toString().padStart(2,'0')}`; }

        // راه‌اندازی
        renderChannels();
        if (channels.length > 0) {
            activeChannelId = channels[0].id;
            playChannel(channels[0]);
            setTimeout(() => {
                const el = document.querySelector('.channel-list li, .grid-item');
                if (el) el.classList.add('active');
            }, 100);
        }
    </script>
</body>
</html>
