<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup 2026 Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* استایل‌های کامل نسخه اول */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0a0a; color: #fff; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 16px;
            position: relative; overflow-x: hidden;
        }
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
        }
        .bg-animated::before, .bg-animated::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.25;
            animation: float 18s ease-in-out infinite alternate;
        }
        .bg-animated::before {
            width: 600px; height: 600px; background: radial-gradient(circle, #c471ed 0%, transparent 70%);
            top: -200px; left: -150px; animation-duration: 20s;
        }
        .bg-animated::after {
            width: 500px; height: 500px; background: radial-gradient(circle, #f7797d 0%, transparent 70%);
            bottom: -200px; right: -100px; animation-duration: 25s; animation-delay: 2s;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .container { position: relative; z-index: 1; width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 25px; }
        .header { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 10px; }
        .lion-sun { width: 50px; height: 50px; flex-shrink: 0; }
        .lion-sun img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 6px rgba(224, 176, 14, 0.5)); }
        .header h1 {
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(to right, #c471ed, #f7797d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .live-badge {
            background: #ff4d4d; color: #fff; padding: 4px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
        }
        .dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .telegram-btn, .copy-link-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #ddd; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem;
            text-decoration: none; transition: 0.3s; cursor: pointer;
        }
        .telegram-btn:hover, .copy-link-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

        .player-card {
            background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
        .big-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5;
        }
        .big-play-btn.hidden { display: none; }
        .big-play-btn svg { width: 40px; height: 40px; fill: #fff; margin-left: 5px; }

        .controls {
            display: flex; align-items: center; gap: 15px; padding: 15px 25px; background: rgba(0,0,0,0.85);
        }
        .controls button { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; }
        .controls svg { width: 24px; height: 24px; fill: currentColor; }
        .volume-slider { width: 80px; accent-color: #f7797d; cursor: pointer; }
        .quality-selector {
            background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 5px; border-radius: 5px; font-size: 0.8rem;
        }
        .spinner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 10;
        }
        .spinner-overlay.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #f7797d; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <a href="https://t.me/NetAccount" target="_blank" class="telegram-btn">📢 Telegram</a>
                <div class="lion-sun"><img src="https://i.ibb.co/xSc82hzp/Lion-and-Sun-svg.png" alt="Lion"></div>
                <div class="live-badge" id="syncLive"><div class="dot"></div> LIVE</div>
            </div>
            <h1>World Cup 2026 <span style="color: #ff4d4d;">Live</span></h1>
        </div>

        <div class="player-card">
            <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>
            <video id="video" playsinline></video>
            <div class="big-play-btn" id="bigPlayBtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            
            <div class="controls">
                <button id="playPauseBtn">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="muteBtn">
                    <svg id="volIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                </button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                <div style="flex:1"></div>
                <select class="quality-selector" id="qualitySelector"><option value="-1">Auto Quality</option></select>
                <button id="fullscreenBtn"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
            </div>
        </div>
        <button class="copy-link-btn" id="copyLinkBtn" style="align-self: center;">🔗 Copy Stream Link</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const spinner = document.getElementById('spinnerOverlay');
        const bigPlayBtn = document.getElementById('bigPlayBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const qualitySelector = document.getElementById('qualitySelector');
        const syncLive = document.getElementById('syncLive');
        
        const rawUrl = 'https://soccerball.st/s1.php';
        const streamUrl = 'https://corsproxy.io/?url=' + encodeURIComponent(rawUrl);
        let hls = null;

        function initPlayer() {
            spinner.classList.add('active');
            if (Hls.isSupported()) {
                hls = new Hls({
                    liveSyncDurationCount: 3,
                    liveMaxLatencyDurationCount: 10,
                    startPosition: -1, 
                    manifestLoadingMaxRetry: 20
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    spinner.classList.remove('active');
                    updateQualityLevels();
                    video.play().catch(() => {
                        bigPlayBtn.classList.remove('hidden');
                    });
                });
                hls.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) hls.startLoad(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    spinner.classList.remove('active');
                    video.play();
                });
            }
        }

        function updateQualityLevels() {
            if (!hls) return;
            qualitySelector.innerHTML = '<option value="-1">Auto Quality</option>';
            hls.levels.forEach((level, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = level.height ? level.height + 'p' : 'Level ' + i;
                qualitySelector.appendChild(opt);
            });
        }

        qualitySelector.onchange = () => { hls.currentLevel = parseInt(qualitySelector.value); };

        function togglePlay() {
            if (!video.src && !hls) { initPlayer(); return; }
            video.paused ? video.play() : video.pause();
        }

        video.onplay = () => {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            bigPlayBtn.classList.add('hidden');
        };

        video.onpause = () => {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            bigPlayBtn.classList.remove('hidden');
        };

        syncLive.onclick = () => {
            spinner.classList.add('active');
            if (hls) {
                hls.stopLoad();
                hls.startLoad(-1); 
                video.currentTime = video.duration - 0.5;
            } else {
                video.currentTime = video.duration;
            }
            video.play().finally(() => spinner.classList.remove('active'));
        };

        bigPlayBtn.onclick = togglePlay;
        playPauseBtn.onclick = togglePlay;
        video.onclick = togglePlay;
        volumeSlider.oninput = () => { video.volume = volumeSlider.value; };
        
        document.getElementById('fullscreenBtn').onclick = () => {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
            else if (video.msRequestFullscreen) video.msRequestFullscreen();
        };

        document.getElementById('copyLinkBtn').onclick = () => {
            navigator.clipboard.writeText(rawUrl);
            alert('Stream link copied!');
        };

        // شروع اولیه
        initPlayer();
    </script>
</body>
</html>
