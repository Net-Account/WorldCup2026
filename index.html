<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پخش‌کننده زنده M3U8</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #0b0c1a;
            --surface: #14152b;
            --navy: #1f2a5e;
            --pink: #ff6b9d;
            --pink-light: #ffa7c4;
            --text: #f0f0f5;
            --text-dim: #9090aa;
            --radius: 20px;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        .header {
            background: linear-gradient(135deg, var(--navy), #0f1123);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to left, var(--pink), var(--pink-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .add-stream-btn {
            background: var(--pink);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(255,107,157,0.3);
        }
        .add-stream-btn:hover { background: #ff7da6; transform: translateY(-2px); }
        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }
        .player-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .playlist-section {
            flex: 1;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }
        .playlist-section h2 {
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--pink-light);
            border-bottom: 1px solid var(--navy);
            padding-bottom: 10px;
        }
        .stream-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .stream-item:hover { background: rgba(255,107,157,0.1); border-color: var(--pink); }
        .stream-item.active { background: var(--pink); color: #fff; font-weight: 500; }
        .stream-item .delete-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .stream-item .delete-btn:hover { color: var(--pink); }
        .player-wrapper {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
        }
        video {
            width: 100%;
            display: block;
            background: #000;
            aspect-ratio: 16/9;
            object-fit: contain;
        }
        .spinner {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        .spinner.active { display: block; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 0 0 var(--radius) var(--radius);
        }
        .controls button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            padding: 5px;
        }
        .controls button:hover { color: var(--pink); }
        .progress-container {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pink), var(--pink-light));
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .time {
            font-size: 13px;
            color: #fff;
            white-space: nowrap;
        }
        .volume-slider {
            width: 80px;
            accent-color: var(--pink);
        }
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow);
        }
        .modal h3 { color: var(--pink-light); margin-bottom: 20px; }
        .modal input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--navy);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            outline: none;
        }
        .modal input:focus { border-color: var(--pink); }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-btns button {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            font-family: inherit;
            cursor: pointer;
        }
        .save-btn { background: var(--pink); color: #fff; }
        .cancel-btn { background: transparent; border: 1px solid var(--navy); color: var(--text-dim); }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .playlist-section { max-height: 300px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>✨ پخش‌کننده زنده</h1>
        <button class="add-stream-btn" onclick="openModal()">➕ افزودن پخش</button>
    </header>

    <div class="main-container">
        <div class="player-section">
            <div class="player-wrapper">
                <video id="video" controlsList="nodownload" playsinline></video>
                <div class="spinner" id="spinner"></div>
                <div class="controls">
                    <button id="playPauseBtn">▶️</button>
                    <button id="muteBtn">🔊</button>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.05" value="1">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <span class="time" id="timeDisplay">00:00 / 00:00</span>
                    <button id="fullscreenBtn">⛶</button>
                </div>
            </div>
        </div>

        <div class="playlist-section" id="playlist">
            <h2>📋 کانال‌های من</h2>
            <div id="streamList"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>افزودن پخش جدید</h3>
            <input type="text" id="streamName" placeholder="نام کانال (مثلاً شبکه ورزش)">
            <input type="text" id="streamUrl" placeholder="آدرس m3u8">
            <div class="modal-btns">
                <button class="cancel-btn" onclick="closeModal()">لغو</button>
                <button class="save-btn" onclick="addStream()">افزودن</button>
            </div>
        </div>
    </div>

    <script>
        // سه شبکه ورزشی پیش‌فرض که کلید DRM نمی‌خواهند
        const defaultStreams = [
            { name: "TSN SPORTS HD", url: "https://soccerball.st/s1.php" },
            { name: "FOX SPORTS HD", url: "https://edgestreams.pro/hls/24SDAZFcsqnj24.m3u8" },
            { name: "Binge+", url: "https://tc-sg.rockstreamer.com/v1/019ed91616121ea540a8171c8e801f/019ed92ac80315fc600b1796d4ad8b/main.m3u8" }
        ];

        let streams = JSON.parse(localStorage.getItem('m3u8_streams'));
        if (!streams || streams.length === 0) {
            streams = defaultStreams;
            localStorage.setItem('m3u8_streams', JSON.stringify(streams));
        }

        const video = document.getElementById('video');
        const spinner = document.getElementById('spinner');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const streamListDiv = document.getElementById('streamList');

        let hls = null;
        let currentStreamIndex = -1;

        renderStreams();

        // پخش اولین کانال در صورت وجود
        if (streams.length > 0 && currentStreamIndex === -1) {
            playStream(0);
        }

        function renderStreams() {
            streamListDiv.innerHTML = '';
            streams.forEach((stream, index) => {
                const div = document.createElement('div');
                div.className = 'stream-item';
                if (index === currentStreamIndex) div.classList.add('active');
                div.innerHTML = `
                    <span>${stream.name}</span>
                    <button class="delete-btn" data-index="${index}">&times;</button>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) {
                        e.stopPropagation();
                        deleteStream(index);
                    } else {
                        playStream(index);
                    }
                });
                streamListDiv.appendChild(div);
            });
        }

        function deleteStream(index) {
            if (confirm('آیا از حذف این پخش مطمئن هستید؟')) {
                streams.splice(index, 1);
                localStorage.setItem('m3u8_streams', JSON.stringify(streams));
                if (index === currentStreamIndex) {
                    destroyPlayer();
                    currentStreamIndex = -1;
                    video.poster = '';
                } else if (currentStreamIndex > index) {
                    currentStreamIndex--;
                }
                renderStreams();
            }
        }

        function playStream(index) {
            if (index === currentStreamIndex) return;
            const stream = streams[index];
            if (!stream) return;
            destroyPlayer();
            showSpinner(true);
            currentStreamIndex = index;
            renderStreams();

            if (Hls.isSupported()) {
                const hlsInstance = new Hls();
                hlsInstance.loadSource(stream.url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    showSpinner(false);
                    video.play().catch(() => {});
                    updatePlayButton();
                });
                hls = hlsInstance;
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = stream.url;
                video.addEventListener('loadedmetadata', () => {
                    showSpinner(false);
                    video.play().catch(() => {});
                    updatePlayButton();
                }, { once: true });
            } else {
                alert('مرورگر شما از پخش HLS پشتیبانی نمی‌کند.');
                showSpinner(false);
            }
        }

        function destroyPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.src = '';
            video.removeAttribute('src');
        }

        function showSpinner(show) {
            spinner.classList.toggle('active', show);
        }

        function updatePlayButton() {
            playPauseBtn.textContent = video.paused ? '▶️' : '⏸️';
        }
        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('ended', () => {
            playPauseBtn.textContent = '▶️';
        });

        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const pct = (video.currentTime / video.duration) * 100;
                progressFill.style.width = pct + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            video.currentTime = pct * video.duration;
        });

        playPauseBtn.addEventListener('click', () => {
            if (video.paused) video.play();
            else video.pause();
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
            volumeSlider.value = video.muted ? 0 : video.volume;
        });

        volumeSlider.addEventListener('input', () => {
            video.volume = volumeSlider.value;
            video.muted = (volumeSlider.value == 0);
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.querySelector('.player-wrapper').requestFullscreen();
            }
        });

        function formatTime(sec) {
            if (isNaN(sec)) return '00:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        const modalOverlay = document.getElementById('modalOverlay');
        function openModal() {
            modalOverlay.classList.add('show');
            document.getElementById('streamName').value = '';
            document.getElementById('streamUrl').value = '';
        }
        function closeModal() {
            modalOverlay.classList.remove('show');
        }
        window.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        function addStream() {
            const name = document.getElementById('streamName').value.trim();
            const url = document.getElementById('streamUrl').value.trim();
            if (!name || !url) {
                alert('لطفاً نام و آدرس پخش را وارد کنید.');
                return;
            }
            streams.push({ name, url });
            localStorage.setItem('m3u8_streams', JSON.stringify(streams));
            renderStreams();
            closeModal();
            playStream(streams.length - 1);
        }
    </script>
</body>
</html>
