<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پخش زنده IPTV | گرافیک جدید</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.0/dist/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* ==== متغیرهای تم ==== */
        :root {
            --bg: #0a0f1c;
            --bg2: #111827;
            --card: #1a202c;
            --card-hover: #2d3748;
            --text: #e0e0e0;
            --text2: #a0aec0;
            --accent: #facc15;
            --accent-text: #1a202c;
            --border: #2d3748;
            --input-bg: #2d3748;
            --shadow: 0 0 30px rgba(0,0,0,0.5);
            --radius: 12px;
            --transition: 0.3s ease;
        }
        .light-mode {
            --bg: #f7fafc;
            --bg2: #edf2f7;
            --card: #ffffff;
            --card-hover: #e2e8f0;
            --text: #1a202c;
            --text2: #4a5568;
            --accent: #d69e2e;
            --accent-text: #1a202c;
            --border: #e2e8f0;
            --input-bg: #edf2f7;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background var(--transition), color var(--transition);
        }

        /* ==== HEADER ==== */
        .header {
            background: var(--bg2);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }
        .header h1 {
            font-size: 1.6rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-toggle {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background var(--transition);
        }
        .theme-toggle:hover { background: var(--card-hover); }

        /* ==== LAYOUT ==== */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            background: var(--bg2);
            padding: 15px;
            overflow-y: auto;
            border-left: 1px solid var(--border);
            max-height: calc(100vh - 80px);
            transition: background var(--transition), border-color var(--transition);
        }
        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            border-radius: 8px;
            font-size: 14px;
            transition: background var(--transition);
        }
        .view-toggle {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .view-toggle button {
            flex: 1;
            padding: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        .view-toggle button.active {
            background: var(--accent);
            color: var(--accent-text);
            font-weight: bold;
        }

        /* ==== لیست کانال‌ها ==== */
        .channel-list { list-style: none; }
        .channel-list li {
            padding: 12px 15px;
            margin-bottom: 5px;
            background: var(--card);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .channel-list li:hover { background: var(--card-hover); transform: translateX(-4px); }
        .channel-list li.active {
            background: var(--accent);
            color: var(--accent-text);
            font-weight: bold;
        }

        /* ==== نمایش شبکه‌ای (GRID) ==== */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        .channel-grid .grid-item {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .channel-grid .grid-item:hover {
            background: var(--card-hover);
            transform: translateY(-3px);
        }
        .channel-grid .grid-item.active {
            background: var(--accent);
            color: var(--accent-text);
            font-weight: bold;
        }
        .grid-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* ==== ناحیه پخش ==== */
        .player-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        video {
            width: 100%;
            max-width: 1000px;
            max-height: 70vh;
            background: #000;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: opacity 0.4s ease;
        }
        video.loading { opacity: 0.4; }

        /* ==== کنترل‌های پخش سفارشی ==== */
        .custom-controls {
            width: 100%;
            max-width: 1000px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 0 0 var(--radius) var(--radius);
            margin-top: -4px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            transition: opacity 0.3s;
        }
        .custom-controls button {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            transition: 0.2s;
        }
        .custom-controls button:hover { color: var(--accent); }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .time-display {
            font-size: 13px;
            white-space: nowrap;
        }
        .volume-slider {
            width: 80px;
            accent-color: var(--accent);
        }

        /* ==== اسپینر بارگذاری ==== */
        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 10;
            display: none;
        }
        .spinner.show { display: block; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .note {
            color: var(--text2);
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
        }

        /* ==== RESPONSIVE ==== */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; max-height: 300px; border-left: none; border-bottom: 1px solid var(--border); }
            .player-area { padding: 10px; }
            .custom-controls { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 پخش زنده</h1>
        <button class="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> <span id="theme-label">تاریک</span>
        </button>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <input type="text" class="search-box" id="search" placeholder="🔍 جستجوی کانال...">
            <div class="view-toggle">
                <button id="listViewBtn" class="active" onclick="setView('list')">📋 لیست</button>
                <button id="gridViewBtn" onclick="setView('grid')">🔲 شبکه</button>
            </div>
            <!-- محتوای کانال‌ها به صورت پویا ایجاد می‌شود -->
            <div id="channelContainer"></div>
        </div>

        <div class="player-area">
            <video id="video" muted autoplay playsinline></video>
            <div class="spinner" id="spinner"></div>
            <!-- کنترل‌های سفارشی -->
            <div class="custom-controls" id="controls">
                <button onclick="togglePlay()" id="playBtn">▶️</button>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                <button onclick="toggleMute()" id="muteBtn">🔊</button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" onchange="setVolume(this.value)">
                <button onclick="togglePiP()">🖼️</button>
                <button onclick="document.getElementById('video').requestFullscreen()">⛶</button>
            </div>
            <div class="note">⚠️ کلیدهای DRM ممکن است منقضی شوند. برای به‌روزرسانی فایل را ویرایش کنید.</div>
        </div>
    </div>

    <script>
        // ========== کانال‌ها (همان داده‌های قبلی) ==========
        const channels = [
          { id: 71, name: "CTV SPORTS - AQ", mpd: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/72sjo8hygl/out/v1/3079be34d72a4985852d299a02406a0c/cenc.mpd", keyId: "d185684e2330de5bea436daa094a5e86", key: "014f0116154f5bf0050e03a6b0a23157" },
          { id: 72, name: "CAZE TV - AQ [BR]", mpd: "https://otte.live.fly.ww.aiv-cdn.net/lhr-nitro/live/clients/dash/enc/3ynrpdanq2/out/v1/81fd4c26584044d2b1a1cc5b32fa9af0/cenc.mpd", keyId: "34475edab991ad5e92548aebd710410a", key: "501b209cccd323ac00bf5ac15b406cb4" },
          { id: 73, name: "TSN ENGLISH - AQ", mpd: "https://otte-qw.live.pv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd", keyId: "14eeabf30c14b7fbf3008c03099ce011", key: "17d2ac8dbc5429bd70af3433aa12158d" },
          { id: 74, name: "RTE ENGLISH - AQ", mpd: "https://dai.google.com/linear/dash/event/antwa0EiQm2PoHtx4rBtVw/manifest.mpd", keyId: "d816287e21496989eae1312925a423c5", key: "00da00f13180e7e6cd5ce87d1c974e8d" },
          { id: 75, name: "TSN SPORTS HD", hls: "https://soccerball.st/s1.php" },
          { id: 76, name: "M6 FRANCE - AQ [No delay]", mpd: "https://origin-m6web.live.6cloud.fr/out/v1/6play/6play-m6/cmaf_cenc00/dash-short-hd.mpd", keyId: "433ffba670963e70857859a9dff4be04", key: "51ede3a821229fe81e71282c8eff80e3" },
          { id: 77, name: "D SPORTS - AQ [ES]", mpd: "https://otte.live.fly.ww.aiv-cdn.net/gru-nitro/live/clients/dash/enc/3gg2jnixjn/out/v1/e1840e01f3f14563b66bbb944d5cc54c/cenc.mpd", keyId: "f8b207c10f3f76aeba32a360ec52b9e4", key: "afad49d20eb39670e93e371c1d669921" },
          { id: 78, name: "FOX SPORTS FHD", mpd: "https://otte-qw.live.pv-cdn.net/pdx-nitro/live/clients/dash/enc/ajfoeddkbz/out/v1/b78800b9b2304879b15843f455836829/cenc.mpd", keyId: "f6564ec2aee819046328a0e153be574d", key: "ff46a8a1031eb27ef22576a077c98ab7" },
          { id: 79, name: "FOX SPORTS HD", hls: "https://edgestreams.pro/hls/24SDAZFcsqnj24.m3u8" },
          { id: 80, name: "CANAL SPANISH", mpd: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/ntkdl68eob/out/v1/bd5dfb7676994383881bc6e71877d29d/cenc.mpd", keyId: "d695093ea3e66d75a4d213a3e2cbf360", key: "01be3f645e89a067d2786c295f68dde4" },
          { id: 81, name: "Binge+", hls: "https://tc-sg.rockstreamer.com/v1/019ed91616121ea540a8171c8e801f/019ed92ac80315fc600b1796d4ad8b/main.m3u8" }
        ];

        // ========== DOM elements ==========
        const video = document.getElementById('video');
        const searchInput = document.getElementById('search');
        const channelContainer = document.getElementById('channelContainer');
        const spinner = document.getElementById('spinner');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const playBtn = document.getElementById('playBtn');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');

        let currentView = 'list'; // 'list' or 'grid'
        let currentPlayer = null; // 'shaka' or 'hls'
        let activeChannelId = null;

        // ========== تم ==========
        function applyTheme(dark) {
            document.body.classList.toggle('light-mode', !dark);
            document.getElementById('theme-icon').textContent = dark ? '☀️' : '🌙';
            document.getElementById('theme-label').textContent = dark ? 'روشن' : 'تاریک';
            localStorage.setItem('iptv-theme', dark ? 'dark' : 'light');
        }
        function toggleTheme() {
            const isDark = !document.body.classList.contains('light-mode');
            applyTheme(!isDark);
        }
        // بارگذاری اولیه
        const savedTheme = localStorage.getItem('iptv-theme');
        applyTheme(savedTheme !== 'light');

        // ========== تغییر حالت نمایش ==========
        function setView(view) {
            currentView = view;
            document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
            document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
            renderChannels(searchInput.value);
        }

        // ========== نابود کردن پلیر ==========
        function destroyPlayer() {
            if (currentPlayer === 'shaka') {
                video.src = '';
            } else if (currentPlayer === 'hls') {
                if (window.hlsInstance) {
                    window.hlsInstance.destroy();
                    window.hlsInstance = null;
                }
            }
            currentPlayer = null;
        }

        // ========== پخش کانال ==========
        function playChannel(channel) {
            showSpinner(true);
            destroyPlayer();
            video.classList.add('loading');

            const playPromise = new Promise((resolve, reject) => {
                if (channel.hls) {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(channel.hls);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play().then(resolve).catch(reject);
                        });
                        window.hlsInstance = hls;
                        currentPlayer = 'hls';
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = channel.hls;
                        video.play().then(resolve).catch(reject);
                        currentPlayer = 'hls';
                    } else {
                        reject(new Error('HLS پشتیبانی نمی‌شود'));
                    }
                } else if (channel.mpd) {
                    if (!shaka.Player.isBrowserSupported()) {
                        reject(new Error('Shaka Player پشتیبانی نمی‌شود'));
                        return;
                    }
                    const player = new shaka.Player();
                    player.attach(video);
                    if (channel.keyId && channel.key) {
                        player.configure({
                            drm: {
                                clearKeys: { [channel.keyId]: channel.key }
                            }
                        });
                    }
                    player.load(channel.mpd).then(() => {
                        video.play().then(resolve).catch(reject);
                    }).catch(reject);
                    window.shakaPlayerInstance = player;
                    currentPlayer = 'shaka';
                }
            });

            playPromise.then(() => {
                video.classList.remove('loading');
                showSpinner(false);
                updatePlayButton();
            }).catch(err => {
                console.error(err);
                alert('خطا در پخش: ' + (err.message || err));
                video.classList.remove('loading');
                showSpinner(false);
            });
        }

        function showSpinner(show) {
            spinner.classList.toggle('show', show);
        }

        // ========== رندر کانال‌ها ==========
        function renderChannels(filter = '') {
            const filtered = channels.filter(ch => ch.name.includes(filter));
            channelContainer.innerHTML = '';

            if (currentView === 'list') {
                const ul = document.createElement('ul');
                ul.className = 'channel-list';
                filtered.forEach(ch => {
                    const li = document.createElement('li');
                    li.textContent = ch.name;
                    li.onclick = () => selectChannel(ch, li);
                    if (ch.id === activeChannelId) li.classList.add('active');
                    ul.appendChild(li);
                });
                channelContainer.appendChild(ul);
            } else { // grid
                const grid = document.createElement('div');
                grid.className = 'channel-grid';
                filtered.forEach(ch => {
                    const div = document.createElement('div');
                    div.className = 'grid-item';
                    if (ch.id === activeChannelId) div.classList.add('active');
                    const icon = document.createElement('span');
                    icon.className = 'grid-icon';
                    icon.textContent = '📺';
                    const name = document.createElement('span');
                    name.textContent = ch.name;
                    div.appendChild(icon);
                    div.appendChild(name);
                    div.onclick = () => selectChannel(ch, div);
                    grid.appendChild(div);
                });
                channelContainer.appendChild(grid);
            }
        }

        function selectChannel(channel, element) {
            document.querySelectorAll('.channel-list li, .grid-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            activeChannelId = channel.id;
            playChannel(channel);
        }

        searchInput.addEventListener('input', (e) => renderChannels(e.target.value));

        // ========== کنترل‌های سفارشی ==========
        function togglePlay() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
            updatePlayButton();
        }

        function updatePlayButton() {
            playBtn.textContent = video.paused ? '▶️' : '⏸️';
        }

        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('ended', () => playBtn.textContent = '▶️');

        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const pct = (video.currentTime / video.duration) * 100;
                progressFill.style.width = pct + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            video.currentTime = pct * video.duration;
        });

        function toggleMute() {
            video.muted = !video.muted;
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
            volumeSlider.value = video.muted ? 0 : video.volume;
        }

        function setVolume(val) {
            video.volume = val;
            video.muted = (val == 0);
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
        }

        video.addEventListener('volumechange', () => {
            volumeSlider.value = video.muted ? 0 : video.volume;
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
        });

        function togglePiP() {
            if (document.pictureInPictureElement) {
                document.exitPictureInPicture();
            } else if (document.pictureInPictureEnabled) {
                video.requestPictureInPicture();
            }
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ========== راه‌اندازی ==========
        renderChannels();
        if (channels.length > 0) {
            const firstChannel = channels[0];
            activeChannelId = firstChannel.id;
            playChannel(firstChannel);
            // هایلایت اولین آیتم
            setTimeout(() => {
                const firstItem = document.querySelector('.channel-list li, .grid-item');
                if (firstItem) firstItem.classList.add('active');
            }, 100);
        }

        // مخفی کردن کنترل‌های پیش‌فرض (با CSS هم done)
        video.setAttribute('controls', 'false'); // حذف کنترل‌های پیش‌فرض (هرچند توی CSS نداشتیم)
    </script>
</body>
</html>
