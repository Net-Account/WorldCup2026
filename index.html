<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup 2026 - Channel Selector</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }
        .bg-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
        }
        .bg-animated::before,
        .bg-animated::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.25;
            animation: float 18s ease-in-out infinite alternate;
        }
        .bg-animated::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #c471ed 0%, transparent 70%);
            top: -200px; left: -150px; animation-duration: 20s;
        }
        .bg-animated::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #f7797d 0%, transparent 70%);
            bottom: -200px; right: -100px; animation-duration: 25s; animation-delay: 2s;
        }
        .shape-1 {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, #5f2c82 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            filter: blur(100px); opacity: 0.15;
            animation: float 22s ease-in-out infinite alternate; animation-delay: 1s;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .container {
            position: relative; z-index: 1; width: 100%; max-width: 900px;
            display: flex; flex-direction: column; gap: 25px;
        }
        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
        }
        .lion-sun {
            width: 50px; height: 50px;
            flex-shrink: 0;
        }
        .lion-sun img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 6px rgba(224, 176, 14, 0.5));
        }
        .header h1 {
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(to right, #c471ed, #f7797d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .header h1 .live-text {
            color: #ff4d4d; text-shadow: 0 0 8px rgba(255, 77, 77, 0.6); font-weight: 700;
            -webkit-text-fill-color: #ff4d4d; background: none;
        }
        .copy-link-btn, .telegram-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ddd;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: 0.2s;
            font-family: inherit;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .copy-link-btn:hover, .telegram-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
        .telegram-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .player-card {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }
        video { width: 100%; display: block; aspect-ratio: 16/9; background: #000; object-fit: contain; cursor: pointer; }
        
        .big-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.3s; z-index: 5;
        }
        .big-play-btn.hidden { opacity: 0; pointer-events: none; }
        .big-play-btn svg { width: 36px; height: 36px; fill: #fff; }

        .error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10; color: #fff;
            text-align: center; padding: 20px;
        }
        .error-overlay.active { display: flex; }
        .error-overlay svg { width: 48px; height: 48px; fill: #ff4d4d; margin-bottom: 10px; }
        .error-overlay p { margin-bottom: 15px; font-size: 0.9rem; color: #ccc; }
        .error-overlay button {
            background: linear-gradient(135deg, #c471ed, #f7797d); border: none; color: #fff; 
            padding: 10px 25px; border-radius: 20px; cursor: pointer; font-family: inherit; font-weight: bold;
            box-shadow: 0 4px 15px rgba(247,121,125,0.4);
        }

        .controls {
            display: flex; align-items: center; gap: 12px; padding: 12px 20px;
            background: rgba(0,0,0,0.8);
        }
        .controls button {
            background: none; border: none; color: #fff; cursor: pointer;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; padding: 0;
        }
        .controls button:hover { color: #f7797d; }
        .controls button svg { width: 20px; height: 20px; fill: currentColor; }
        .progress-bar {
            flex: 1; height: 5px; background: rgba(255,255,255,0.15); border-radius: 5px;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #c471ed, #f7797d);
            border-radius: 5px; transition: width 0.1s linear;
        }
        .time { font-size: 0.8rem; color: #ddd; white-space: nowrap; }
        .volume-slider { width: 70px; accent-color: #c471ed; }
        .quality-selector {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            outline: none;
            font-family: inherit;
        }
        .quality-selector option { background: #1a1a2e; color: #fff; }

        .channel-strip {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
        }
        .channel-btn {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            font-family: inherit;
            font-size: 0.85rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .channel-btn:hover { transform: translateY(-3px); border-color: #c471ed; box-shadow: 0 15px 30px rgba(196,113,237,0.25); }
        .channel-btn.active {
            background: linear-gradient(135deg, #c471ed, #f7797d);
            border-color: transparent;
            color: #000;
            box-shadow: 0 10px 25px rgba(247,121,125,0.5);
        }
        .spinner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .spinner-overlay.active { display: flex; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #f7797d; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding-top: 8px; }
            .header h1 { font-size: 1.6rem; }
            .header-top { position: relative; justify-content: space-between; height: 36px; }
            .copy-link-btn, .telegram-btn { padding: 2px 8px; font-size: 0.65rem; gap: 3px; line-height: 1; }
            .telegram-btn svg { width: 12px; height: 12px; }
            .lion-sun { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 34px; height: 34px; }
            .big-play-btn { width: 64px; height: 64px; }
            .big-play-btn svg { width: 28px; height: 28px; }
            .controls { gap: 8px; padding: 10px 15px; }
            .volume-slider { width: 60px; }
            .channel-btn { padding: 8px 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animated"><div class="shape-1"></div></div>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <a href="https://t.me/NetAccount" target="_blank" class="telegram-btn" title="Telegram Channel">
                    <svg viewBox="0 0 24 24"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
                    Telegram
                </a>
                <div class="lion-sun">
                    <img src="https://i.ibb.co/xSc82hzp/Lion-and-Sun-svg.png" alt="Lion and Sun">
                </div>
                <button class="copy-link-btn" id="copyLinkBtn" title="Copy Link">🔗 Copy</button>
            </div>
            <h1>World Cup 2026 <span class="live-text">Live</span></h1>
        </div>

        <div class="player-card">
            <video id="video" playsinline></video>
            
            <div class="error-overlay" id="errorOverlay">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <p id="errorMsg">Stream is offline or unavailable.</p>
                <button onclick="retryStream()">Retry Connection</button>
            </div>

            <div class="big-play-btn" id="bigPlayBtn">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="controls">
                <button id="playPauseBtn" title="Play / Pause">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span class="time" id="timeDisplay">00:00 / 00:00</span>
                <button id="muteBtn" title="Mute">
                    <svg id="volumeOnIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="volumeOffIcon" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                <select class="quality-selector" id="qualitySelector">
                    <option value="-1">Auto</option>
                </select>
                <button id="pipBtn" title="PiP">
                    <svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
                </button>
                <button id="fullscreenBtn" title="Fullscreen">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>

        <div class="channel-strip" id="channelButtons"></div>
    </div>
    <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>

    <script>
        const streams = [
            { 
                name: "📺 FS1 HD", 
                url: "https://corsproxy.io/?http://190.11.225.124:5000/live/fs1_hd/playlist.m3u8" 
            },
            { 
                name: "🏀 Test Stream (Mux)", 
                url: "https://stream.mux.com/v69RSHhFelSm4701snP22dYz2jICy4E4FUyk02rW4gxRM.m3u8" 
            },
            { 
                name: "🐰 Big Buck Bunny", 
                url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" 
            }
        ];

        let currentStreamIndex = 0;
        let hls = null;

        const video = document.getElementById('video');
        const spinnerOverlay = document.getElementById('spinnerOverlay');
        const errorOverlay = document.getElementById('errorOverlay');
        const errorMsg = document.getElementById('errorMsg');
        const bigPlayBtn = document.getElementById('bigPlayBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const volumeOnIcon = document.getElementById('volumeOnIcon');
        const volumeOffIcon = document.getElementById('volumeOffIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const qualitySelector = document.getElementById('qualitySelector');
        const channelContainer = document.getElementById('channelButtons');

        streams.forEach((stream, idx) => {
            const btn = document.createElement('button');
            btn.className = `channel-btn ${idx === 0 ? 'active' : ''}`;
            btn.textContent = stream.name;
            btn.addEventListener('click', () => loadChannel(idx));
            channelContainer.appendChild(btn);
        });

        const channelButtons = document.querySelectorAll('.channel-btn');

        function showError(msg) {
            errorMsg.textContent = msg || 'Stream unavailable.';
            errorOverlay.classList.add('active');
            spinnerOverlay.classList.remove('active');
            bigPlayBtn.classList.add('hidden');
        }

        function hideError() {
            errorOverlay.classList.remove('active');
        }

        function retryStream() {
            loadChannel(currentStreamIndex);
        }

        function loadChannel(index) {
            if (hls) { hls.destroy(); hls = null; }
            video.src = '';
            video.removeAttribute('src');
            hideError();

            currentStreamIndex = index;
            channelButtons.forEach((btn, i) => btn.classList.toggle('active', i === index));

            spinnerOverlay.classList.add('active');
            bigPlayBtn.classList.add('hidden');

            if (Hls.isSupported()) {
                hls = new Hls({
                    liveSyncDurationCount: 3,
                    liveMaxLatencyDurationCount: 10,
                    enableWorker: true,
                });
                
                hls.loadSource(streams[index].url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    spinnerOverlay.classList.remove('active');
                    populateQualityLevels(hls);
                    
                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            bigPlayBtn.classList.add('hidden');
                            updatePlayButton();
                        }).catch(error => {
                            console.log("Autoplay blocked:", error);
                            bigPlayBtn.classList.remove('hidden');
                            updatePlayButton();
                        });
                    }
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.error('HLS Error:', data);
                    if (data.fatal) {
                        if (hls) hls.destroy();
                        hls = null;
                        spinnerOverlay.classList.remove('active');
                        
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            showError("Connection failed. Check internet or CORS settings.");
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            showError("Media format error. Trying to recover...");
                            if (hls) hls.recoverMediaError();
                        } else {
                            showError("Stream is offline or unsupported.");
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streams[index].url;
                video.addEventListener('loadedmetadata', () => {
                    spinnerOverlay.classList.remove('active');
                    video.play().catch(() => {
                        bigPlayBtn.classList.remove('hidden');
                    });
                    updatePlayButton();
                }, { once: true });
                
                video.addEventListener('error', () => {
                    showError("Failed to load native HLS.");
                }, { once: true });
            } else {
                showError("Your browser does not support HLS.");
            }
        }

        function populateQualityLevels(hlsInstance) {
            qualitySelector.innerHTML = '<option value="-1">Auto</option>';
            if (hlsInstance.levels.length) {
                for (let i = hlsInstance.levels.length - 1; i >= 0; i--) {
                    const lvl = hlsInstance.levels[i];
                    const label = lvl.height ? `${lvl.height}p` : `Level ${i+1}`;
                    qualitySelector.innerHTML += `<option value="${i}">${label}</option>`;
                }
            }
        }

        qualitySelector.addEventListener('change', () => {
            if (hls) hls.currentLevel = parseInt(qualitySelector.value);
        });

        function togglePlay() {
            if (!video.src && !hls) { loadChannel(currentStreamIndex); return; }
            if (video.paused) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
            updatePlayButton();
        }

        function updatePlayButton() {
            const paused = video.paused;
            playIcon.style.display = paused ? '' : 'none';
            pauseIcon.style.display = paused ? 'none' : '';
            if (!paused) bigPlayBtn.classList.add('hidden');
        }

        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('ended', () => {
            playIcon.style.display = '';
            pauseIcon.style.display = 'none';
            bigPlayBtn.classList.remove('hidden');
        });

        video.addEventListener('timeupdate', () => {
            if (video.duration && isFinite(video.duration)) {
                const pct = (video.currentTime / video.duration) * 100;
                progressFill.style.width = pct + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            } else {
                progressFill.style.width = '100%'; 
                timeDisplay.textContent = 'LIVE';
            }
        });

        progressBar.addEventListener('click', (e) => {
            if (!isFinite(video.duration)) return;
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            video.currentTime = pct * video.duration;
        });

        function updateVolumeUI() {
            const muted = video.muted || video.volume === 0;
            volumeOnIcon.style.display = muted ? 'none' : '';
            volumeOffIcon.style.display = muted ? '' : 'none';
            volumeSlider.value = video.muted ? 0 : video.volume;
        }

        document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);
        bigPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });

        document.getElementById('muteBtn').addEventListener('click', () => {
            video.muted = !video.muted;
            updateVolumeUI();
        });
        volumeSlider.addEventListener('input', () => {
            video.volume = volumeSlider.value;
            video.muted = (volumeSlider.value == 0);
            updateVolumeUI();
        });
        video.addEventListener('volumechange', updateVolumeUI);

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            document.fullscreenElement
                ? document.exitFullscreen()
                : document.querySelector('.player-card').requestFullscreen();
        });

        document.getElementById('pipBtn').addEventListener('click', async () => {
            try {
                if (document.pictureInPictureElement)
                    await document.exitPictureInPicture();
                else if (document.pictureInPictureEnabled)
                    await video.requestPictureInPicture();
            } catch (e) { console.error('PiP failed', e); }
        });

        document.getElementById('copyLinkBtn').addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(window.location.href);
                const btn = document.getElementById('copyLinkBtn');
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied';
                setTimeout(() => { btn.textContent = originalText; }, 2000);
            } catch (e) { alert('Copy failed'); }
        });

        function formatTime(sec) {
            if (isNaN(sec)) return '00:00';
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        loadChannel(0);
    </script>
</body>
</html>
