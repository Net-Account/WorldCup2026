<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .bg-animated {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .bg-animated::before,
        .bg-animated::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            animation: float 18s ease-in-out infinite alternate;
        }
        .bg-animated::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #c471ed 0%, transparent 70%);
            top: -200px; left: -150px;
            animation-duration: 20s;
        }
        .bg-animated::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #f7797d 0%, transparent 70%);
            bottom: -200px; right: -100px;
            animation-duration: 25s;
            animation-delay: 2s;
        }
        .shape-1 {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, #5f2c82 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(100px);
            opacity: 0.15;
            animation: float 22s ease-in-out infinite alternate;
            animation-delay: 1s;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .container {
            position: relative; z-index: 1;
            width: 100%; max-width: 900px;
            display: flex; flex-direction: column; gap: 25px;
        }
        .header {
            text-align: center;
            position: relative;
        }
        .header h1 {
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(to right, #c471ed, #f7797d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header h1 .live-text {
            color: #ff4d4d;
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.6);
            font-weight: 700;
            -webkit-text-fill-color: #ff4d4d;
            background: none;
        }
        .lion-sun {
            display: inline-block;
            margin-bottom: 8px;
            width: 60px;
            height: 60px;
        }
        .lion-sun img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 6px rgba(224, 176, 14, 0.5));
        }
        .copy-link-btn {
            position: absolute;
            right: 0;
            top: 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #aaa;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: 0.2s;
            font-family: inherit;
            backdrop-filter: blur(5px);
        }
        .copy-link-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .telegram-btn {
            position: absolute;
            left: 0;
            top: 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #aaa;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: 0.2s;
            font-family: inherit;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .telegram-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .telegram-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .player-card {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
        }
        video { width: 100%; display: block; aspect-ratio: 16/9; background: #000; object-fit: contain; cursor: pointer; }
        .big-play-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.3s;
            z-index: 5;
        }
        .big-play-btn.hidden { opacity: 0; pointer-events: none; }
        .big-play-btn svg {
            width: 36px; height: 36px;
            fill: #fff;
            margin-left: 4px;
        }
        .controls {
            display: flex; align-items: center; gap: 12px; padding: 12px 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
        }
        .controls button {
            background: none; border: none; color: #fff; cursor: pointer;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; padding: 0;
        }
        .controls button:hover { color: #f7797d; }
        .controls button svg { width: 20px; height: 20px; fill: currentColor; }
        .progress-bar {
            flex: 1; height: 5px; background: rgba(255,255,255,0.15); border-radius: 5px;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #c471ed, #f7797d);
            border-radius: 5px; transition: width 0.1s linear;
        }
        .time { font-size: 0.8rem; color: #ddd; white-space: nowrap; }
        .volume-slider { width: 70px; accent-color: #c471ed; }
        .channel-card {
            background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 25px 35px; cursor: pointer; transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            align-self: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .channel-card:hover { transform: translateY(-5px); border-color: #c471ed; box-shadow: 0 15px 30px rgba(196,113,237,0.25); }
        .channel-card.active {
            background: linear-gradient(135deg, #c471ed, #f7797d);
            border-color: transparent; color: #fff; font-weight: 700;
            box-shadow: 0 10px 25px rgba(247,121,125,0.5);
        }
        .channel-icon { font-size: 2.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .channel-name { font-size: 1rem; font-weight: 500; text-align: center; }
        .spinner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .spinner-overlay.active { display: flex; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #f7797d; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.6rem; }
            .channel-card { padding: 20px 30px; }
            .big-play-btn { width: 60px; height: 60px; }
            .big-play-btn svg { width: 28px; height: 28px; }
            .lion-sun { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
    <div class="bg-animated"><div class="shape-1"></div></div>
    <div class="container">
        <div class="header">
            <a href="https://t.me/NetAccount" target="_blank" class="telegram-btn" title="کانال تلگرام">
                <svg viewBox="0 0 24 24"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
                کانال تلگرام
            </a>

            <button class="copy-link-btn" id="copyLinkBtn" title="لینک لایو">🔗 لینک لایو</button>

            <div class="lion-sun">
                <img src="https://i.ibb.co/xSc82hzp/Lion-and-Sun-svg.png" alt="Lion and Sun">
            </div>

            <h1>World Cup 2026 <span class="live-text">Live</span></h1>
        </div>
        <div class="player-card">
            <video id="video" playsinline></video>
            <div class="big-play-btn" id="bigPlayBtn" title="پخش">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="controls">
                <button id="playPauseBtn" title="Play / Pause">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span class="time" id="timeDisplay">00:00 / 00:00</span>
                <button id="muteBtn" title="Mute">
                    <svg id="volumeOnIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="volumeOffIcon" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                <button id="pipBtn" title="تصویر در تصویر">
                    <svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
                </button>
                <button id="fullscreenBtn" title="Fullscreen">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>
        <div class="channel-card active" id="tsnCard">
            <span class="channel-icon">🏈</span>
            <span class="channel-name">TSN SPORTS HD</span>
        </div>
    </div>
    <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>

    <script>
        const CORS_PROXY = 'https://corsproxy.io/?url=';
        const channel = {
            name: 'TSN SPORTS HD',
            url: CORS_PROXY + encodeURIComponent('https://soccerball.st/s1.php')
        };

        const video = document.getElementById('video');
        const spinnerOverlay = document.getElementById('spinnerOverlay');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const muteBtn = document.getElementById('muteBtn');
        const volumeOnIcon = document.getElementById('volumeOnIcon');
        const volumeOffIcon = document.getElementById('volumeOffIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const tsnCard = document.getElementById('tsnCard');
        const bigPlayBtn = document.getElementById('bigPlayBtn');
        const pipBtn = document.getElementById('pipBtn');
        const copyLinkBtn = document.getElementById('copyLinkBtn');

        let hls = null;
        let isPlaying = false;

        function playChannel() {
            if (isPlaying) return;
            if (hls) { hls.destroy(); hls = null; }
            video.src = '';
            video.removeAttribute('src');

            spinnerOverlay.classList.add('active');
            isPlaying = true;

            video.muted = false;
            video.volume = volumeSlider.value;
            updateVolumeUI();

            if (Hls.isSupported()) {
                const hlsInstance = new Hls();
                hlsInstance.loadSource(channel.url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    spinnerOverlay.classList.remove('active');
                    video.play().catch(() => {});
                    updatePlayButton();
                    bigPlayBtn.classList.add('hidden');
                });
                hls = hlsInstance;
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('loadedmetadata', () => {
                    spinnerOverlay.classList.remove('active');
                    video.play().catch(() => {});
                    updatePlayButton();
                    bigPlayBtn.classList.add('hidden');
                }, { once: true });
            } else {
                alert('Your browser does not support HLS playback.');
                spinnerOverlay.classList.remove('active');
                isPlaying = false;
            }
        }

        function togglePlay() {
            if (!video.src) {
                playChannel();
                return;
            }
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
            updatePlayButton();
        }

        function updatePlayButton() {
            if (video.paused) {
                playIcon.style.display = '';
                pauseIcon.style.display = 'none';
                bigPlayBtn.classList.remove('hidden');
            } else {
                playIcon.style.display = 'none';
                pauseIcon.style.display = '';
                bigPlayBtn.classList.add('hidden');
            }
        }
        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('ended', () => {
            playIcon.style.display = '';
            pauseIcon.style.display = 'none';
            bigPlayBtn.classList.remove('hidden');
        });

        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const pct = (video.currentTime / video.duration) * 100;
                progressFill.style.width = pct + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            video.currentTime = pct * video.duration;
        });

        playPauseBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);
        bigPlayBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });

        function updateVolumeUI() {
            if (video.muted || video.volume === 0) {
                volumeOnIcon.style.display = 'none';
                volumeOffIcon.style.display = '';
            } else {
                volumeOnIcon.style.display = '';
                volumeOffIcon.style.display = 'none';
            }
            volumeSlider.value = video.muted ? 0 : video.volume;
        }

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            updateVolumeUI();
        });

        volumeSlider.addEventListener('input', () => {
            video.volume = volumeSlider.value;
            video.muted = (volumeSlider.value == 0);
            updateVolumeUI();
        });

        video.addEventListener('volumechange', updateVolumeUI);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.querySelector('.player-card').requestFullscreen();
            }
        });

        pipBtn.addEventListener('click', async () => {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                }
            } catch (e) {
                console.error('PiP failed:', e);
            }
        });

        copyLinkBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(window.location.href);
                const originalText = copyLinkBtn.textContent;
                copyLinkBtn.textContent = '✅ کپی شد';
                setTimeout(() => { copyLinkBtn.textContent = '🔗 لینک لایو'; }, 2000);
            } catch (e) {
                alert('کپی لینک ناموفق بود');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

            switch (e.key) {
                case ' ':
                case 'Spacebar':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    video.volume = Math.min(1, video.volume + 0.1);
                    updateVolumeUI();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    video.volume = Math.max(0, video.volume - 0.1);
                    updateVolumeUI();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    video.currentTime = Math.max(0, video.currentTime - 5);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    video.currentTime = Math.min(video.duration || 0, video.currentTime + 5);
                    break;
                case 'm':
                case 'M':
                    e.preventDefault();
                    video.muted = !video.muted;
                    updateVolumeUI();
                    break;
                case 'f':
                case 'F':
                    e.preventDefault();
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        document.querySelector('.player-card').requestFullscreen();
                    }
                    break;
            }
        });

        function formatTime(sec) {
            if (isNaN(sec)) return '00:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        tsnCard.addEventListener('click', () => {
            if (!isPlaying) playChannel();
        });
    </script>
</body>
</html>
