<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پخش زنده ۳ شبکه ورزشی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #000;         /* پس‌زمینه کاملاً مشکی */
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .header {
            text-align: center;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #c471ed, #f7797d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .header p {
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Player card */
        .player-card {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
            object-fit: contain;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        .controls button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .controls button:hover { color: #f7797d; }
        .progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.15);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c471ed, #f7797d);
            border-radius: 5px;
            transition: width 0.1s linear;
        }
        .time {
            font-size: 0.8rem;
            color: #ddd;
            white-space: nowrap;
        }
        .volume-slider {
            width: 70px;
            accent-color: #c471ed;
        }

        /* Channel cards */
        .channel-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .channel-card {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 150px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .channel-card:hover {
            transform: translateY(-5px);
            border-color: #c471ed;
            box-shadow: 0 15px 30px rgba(196, 113, 237, 0.25);
        }
        .channel-card.active {
            background: linear-gradient(135deg, #c471ed, #f7797d);
            border-color: transparent;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(247, 121, 125, 0.5);
        }
        .channel-icon {
            font-size: 2rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .channel-name {
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
        }

        /* Spinner */
        .spinner-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .spinner-overlay.active { display: flex; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #f7797d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .channel-selector { gap: 10px; }
            .channel-card { padding: 15px 20px; min-width: 120px; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 پخش زنده ورزشی</h1>
            <p>TSN SPORTS · FOX SPORTS · Binge+</p>
        </div>

        <!-- Player -->
        <div class="player-card">
            <video id="video" playsinline></video>
            <div class="controls">
                <button id="playPauseBtn" title="پخش / توقف">▶️</button>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill" style="width:0%"></div>
                </div>
                <span class="time" id="timeDisplay">00:00 / 00:00</span>
                <button id="muteBtn" title="قطع صدا">🔊</button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                <button id="fullscreenBtn" title="تمام‌صفحه">⛶</button>
            </div>
        </div>

        <!-- Channel cards -->
        <div class="channel-selector" id="channelSelector">
            <div class="channel-card" data-index="0">
                <span class="channel-icon">🏈</span>
                <span class="channel-name">TSN SPORTS HD</span>
            </div>
            <div class="channel-card" data-index="1">
                <span class="channel-icon">⚽</span>
                <span class="channel-name">FOX SPORTS HD</span>
            </div>
            <div class="channel-card" data-index="2">
                <span class="channel-icon">🎬</span>
                <span class="channel-name">Binge+</span>
            </div>
        </div>
    </div>

    <!-- Spinner -->
    <div class="spinner-overlay" id="spinnerOverlay">
        <div class="spinner"></div>
    </div>

    <script>
        const channels = [
            { name: 'TSN SPORTS HD', url: 'https://soccerball.st/s1.php' },
            { name: 'FOX SPORTS HD', url: 'https://edgestreams.pro/hls/24SDAZFcsqnj24.m3u8' },
            { name: 'Binge+', url: 'https://tc-sg.rockstreamer.com/v1/019ed91616121ea540a8171c8e801f/019ed92ac80315fc600b1796d4ad8b/main.m3u8' }
        ];

        const video = document.getElementById('video');
        const spinnerOverlay = document.getElementById('spinnerOverlay');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const channelCards = document.querySelectorAll('.channel-card');

        let hls = null;
        let currentIndex = -1;

        function playChannel(index) {
            if (index === currentIndex) return;
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.src = '';
            video.removeAttribute('src');

            spinnerOverlay.classList.add('active');
            currentIndex = index;
            updateActiveCard();

            const stream = channels[index];
            if (Hls.isSupported()) {
                const hlsInstance = new Hls();
                hlsInstance.loadSource(stream.url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    spinnerOverlay.classList.remove('active');
                    video.play().catch(() => {});
                    updatePlayButton();
                });
                hls = hlsInstance;
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = stream.url;
                video.addEventListener('loadedmetadata', () => {
                    spinnerOverlay.classList.remove('active');
                    video.play().catch(() => {});
                    updatePlayButton();
                }, { once: true });
            } else {
                alert('مرورگر شما از پخش HLS پشتیبانی نمی‌کند.');
                spinnerOverlay.classList.remove('active');
            }
        }

        function updateActiveCard() {
            channelCards.forEach((card, idx) => {
                card.classList.toggle('active', idx === currentIndex);
            });
        }

        function updatePlayButton() {
            playPauseBtn.textContent = video.paused ? '▶️' : '⏸️';
        }
        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);
        video.addEventListener('ended', () => playPauseBtn.textContent = '▶️');

        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const pct = (video.currentTime / video.duration) * 100;
                progressFill.style.width = pct + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            video.currentTime = pct * video.duration;
        });

        playPauseBtn.addEventListener('click', () => {
            video.paused ? video.play() : video.pause();
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
            volumeSlider.value = video.muted ? 0 : video.volume;
        });

        volumeSlider.addEventListener('input', () => {
            video.volume = volumeSlider.value;
            video.muted = (volumeSlider.value == 0);
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.querySelector('.player-card').requestFullscreen();
            }
        });

        function formatTime(sec) {
            if (isNaN(sec)) return '00:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        channelCards.forEach(card => {
            card.addEventListener('click', () => {
                const index = parseInt(card.getAttribute('data-index'));
                playChannel(index);
            });
        });

        // پخش اولین شبکه
        playChannel(0);
    </script>
</body>
</html>
